# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Next.js 16.2.10 (App Router) + TypeScript 5, React 19.2.4, shadcn/ui
  (4.13.0) + @base-ui/react + Tailwind CSS v4, Supabase (Postgres + Auth, RLS)
  planned, Zod planned, OpenAPI/Swagger planned, deploy on Vercel.
  Phase: Fase 1 in progress — Next.js scaffold bootstrapped and test tooling
  installed/verified (commit aa7715e); SDD planning artifacts exist for the
  `mocked-mvp-scaffold` change (explore/proposal/design saved, commit 630e607).
  Product: internal MVP SaaS — customers, invoices, payments, balances; multi-tenant
  via server-resolved business_id; not official/electronic invoicing.
  Architecture: layered UI / validation (Zod) / services / data-access; business_id,
  status, and computed totals always server-derived, never trusted from client.
  Testing: Vitest (unit/component, jsdom) + Testing Library + Playwright (E2E)
  installed and verified working; see testing: below. docs/testing-plan.md still
  defines the fuller functional/security/API/responsive test matrix to build out.
  Style: functional/product docs in Spanish; SDD technical artifacts default to
  English unless Spanish is explicitly requested.

testing:
  strict_tdd: true
  test_runner: vitest+playwright
  test_command: "npm run test"
  build_command: "npm run build"
  coverage_threshold: 0
  notes: >
    Vitest (unit/component, jsdom) and Playwright (E2E) installed and verified
    working (commit aa7715e). Passing example tests: lib/example.test.ts,
    app/page.test.tsx, e2e/smoke.spec.ts. E2E command: `npm run test:e2e`.
    Coverage not yet configured. strict_tdd now defaults to true per the
    no-marker fallback rule now that a real test runner exists.

rules:
  proposal:
    - Include rollback plan for risky changes
    - Explicitly call out multi-tenant/business_id and RLS impact for any data-touching proposal
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - State RLS/business_id scoping requirements for any requirement that touches operational tables
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Note which layer (UI / validation / service / data-access) owns each responsibility
    - Flag atomicity requirements for financial mutations (invoice creation, payment registration)
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    - Never trust business_id, status, or computed totals from client payloads — resolve/recompute server-side
    tdd: true
    test_command: "npm run test"
  verify:
    test_command: "npm run test"
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
